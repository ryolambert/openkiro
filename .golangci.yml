linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused

issues:
  exclude-rules:
    # Test files — don't enforce errcheck
    - path: "(.+)_test\\.go"
      linters: [errcheck]
    # HTTP handler writes — errors are unrecoverable over the wire
    - path: "internal/proxy/server\\.go"
      linters: [errcheck]
    # Style suggestion — pre-existing
    - path: "internal/proxy/response\\.go"
      linters: [staticcheck]
      text: "QF1003"
    # Capitalized error string — pre-existing
    - linters: [staticcheck]
      text: "ST1005"
    # Unused const — may be needed later
    - path: "internal/proxy/types\\.go"
      linters: [unused]
      text: "ProfileArnIAM"
